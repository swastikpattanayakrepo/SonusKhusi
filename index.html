<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Khusi Sonu Water Tracker</title>
<meta name="theme-color" content="#0a2540" />
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Water%22,%22short_name%22:%22Water%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a2540%22,%22theme_color%22:%22%230a2540%22}" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0a2540;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
  }
  .bgphoto {
    position: fixed;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }
  .bgphoto::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(10,37,64,0.88) 0%, rgba(10,37,64,0.93) 40%, rgba(10,37,64,0.97) 100%);
  }
  .wrap { width: 100%; max-width: 380px; position: relative; z-index: 1; }
  h1 {
    color: #eaf6fb;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 28px;
    font-weight: 400;
    text-align: center;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .date {
    color: #5e91a8;
    font-size: 12px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 6px 0 12px;
  }
  .lovenote {
    text-align: center;
    color: #7dd3e8;
    font-size: 13px;
    font-style: italic;
    line-height: 1.5;
    margin: 0 0 28px;
    padding: 0 12px;
  }
  .lovenote .heart { color: #ff8fa3; font-style: normal; }
  .photoframe {
    width: 100%;
    border-radius: 18px;
    overflow: hidden;
    margin: 0 0 20px;
    border: 1px solid rgba(125,211,232,0.25);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .photoframe img {
    width: 100%;
    display: block;
    max-height: 220px;
    object-fit: cover;
  }
  .vessel-outer {
    position: relative;
    width: 224px;
    height: 288px;
    margin: 0 auto 28px;
    transition: transform 0.3s;
  }
  .vessel-outer.pulse { transform: scale(1.03); }
  svg.glass { position: absolute; inset: 0; width: 100%; height: 100%;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.35)); }
  .readout {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .readout .amt { color: #eaf6fb; font-size: 30px; font-weight: 300; }
  .readout .goal { color: #7dd3e8; font-size: 12px; letter-spacing: 0.03em; margin-top: 2px; }
  .status { text-align: center; color: #5e91a8; font-size: 14px; height: 20px; margin-bottom: 24px; }
  .status.hit { color: #7dd3e8; }
  .quickgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .qbtn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: #102f4d; border: 1px solid #1f4a66; border-radius: 16px;
    padding: 16px 8px; cursor: pointer; transition: transform 0.1s, background 0.15s;
    color: #eaf6fb;
  }
  .qbtn:hover { background: #16395d; }
  .qbtn:active { transform: scale(0.95); }
  .qbtn .label { font-size: 12px; font-weight: 500; }
  .qbtn .ml { color: #5e91a8; font-size: 11px; }
  .qbtn svg { color: #7dd3e8; }
  .customwrap { margin-bottom: 24px; }
  .customrow { display: flex; gap: 8px; }
  input[type="number"], input.goalinput {
    background: #102f4d; border: 1px solid #1f4a66; border-radius: 12px;
    color: #eaf6fb; padding: 12px 14px; font-size: 14px; outline: none;
    flex: 1; width: 100%;
  }
  input[type="number"]::placeholder { color: #5e91a8; }
  input[type="number"]:focus, input.goalinput:focus { border-color: #7dd3e8; }
  .addbtn {
    background: #1b6e8c; color: #eaf6fb; border: none; border-radius: 12px;
    padding: 0 18px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .addbtn:hover { background: #1f7fa1; }
  .addbtn:active { transform: scale(0.95); }
  .customtoggle {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
    border: 1px dashed #2d5a73; border-radius: 12px; color: #5e91a8;
    background: none; padding: 12px; font-size: 14px; cursor: pointer;
  }
  .customtoggle:hover { border-color: #7dd3e8; color: #7dd3e8; }
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: #5e91a8;
  }
  .footer button {
    background: none; border: none; color: #5e91a8; font-size: 12px;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .footer button:hover:not(:disabled) { color: #eaf6fb; }
  .footer button:disabled { opacity: 0.3; cursor: default; }
  .goaledit { display: flex; align-items: center; gap: 6px; }
  .goaledit input { width: 64px; padding: 6px 8px; border-radius: 8px; font-size: 12px; }
  .log {
    margin-top: 28px; border-top: 1px solid #1f4a66; padding-top: 14px;
  }
  .log .loglabel {
    color: #5e91a8; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .logitems { max-height: 160px; overflow-y: auto; padding-right: 4px; }
  .logitem {
    display: flex; justify-content: space-between; font-size: 14px; color: #9bbfd1; padding: 5px 0;
  }
  .logitem .time { color: #4a7286; font-size: 11px; }
  @keyframes waveshift { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .wave1 { animation: waveshift 7s linear infinite; }
  .wave2 { animation: waveshift 11s linear infinite reverse; }
  @media (prefers-reduced-motion: reduce) {
    .wave1, .wave2 { animation: none; }
  }
</style>
</head>
<body>
<div class="bgphoto" id="bgPhoto"></div>
<div class="wrap">
  <h1>Water</h1>
  <div class="date" id="dateLabel"></div>
  <div class="lovenote" id="loveNote"></div>
  <div class="photoframe" id="photoFrame"><img id="photoImg" alt="Our photo" /></div>

  <div class="vessel-outer" id="vesselOuter">
    <svg class="glass" viewBox="0 0 200 260">
      <defs>
        <clipPath id="glassClip">
          <path d="M30 10 H170 L155 250 H45 Z" />
        </clipPath>
      </defs>
      <path d="M30 10 H170 L155 250 H45 Z" fill="rgba(255,255,255,0.03)" stroke="#2d5a73" stroke-width="2" />
      <g clip-path="url(#glassClip)">
        <rect id="fillRect" x="0" y="260" width="200" height="20" fill="#1b6e8c" style="transition: y 0.6s ease-out" />
        <g id="waveGroup" style="transition: transform 0.6s ease-out" transform="translate(0,250)">
          <path class="wave1" d="M0 10 Q 25 0, 50 10 T 100 10 T 150 10 T 200 10 T 250 10 T 300 10 T 350 10 T 400 10 V 40 H 0 Z" fill="#27c2e8" opacity="0.55" />
          <path class="wave2" d="M0 12 Q 25 4, 50 12 T 100 12 T 150 12 T 200 12 T 250 12 T 300 12 T 350 12 T 400 12 V 40 H 0 Z" fill="#7dd3e8" opacity="0.4" />
        </g>
      </g>
      <path d="M30 10 H170" stroke="#7dd3e8" stroke-width="2" opacity="0.5" />
    </svg>
    <div class="readout">
      <div class="amt" id="amtLabel">0</div>
      <div class="goal" id="goalLabel">of 2,000 ml</div>
    </div>
  </div>

  <div class="status" id="statusLabel"></div>

  <div class="quickgrid" id="quickGrid"></div>

  <div class="customwrap">
    <div class="customrow" id="customRow" style="display:none;">
      <input type="number" inputmode="numeric" placeholder="Amount in ml" id="customInput" />
      <button class="addbtn" id="customAddBtn">Add</button>
    </div>
    <button class="customtoggle" id="customToggleBtn">+ Custom amount</button>
  </div>

  <div class="footer">
    <button id="undoBtn">↩ Undo last</button>
    <button id="goalToggleBtn">Set daily goal</button>
    <span class="goaledit" id="goalEdit" style="display:none;">
      <input class="goalinput" type="number" id="goalInput" />
      <span style="color:#5e91a8;">ml goal</span>
    </span>
    <button id="resetBtn">↺ Reset</button>
  </div>

  <div class="log" id="logSection" style="display:none;">
    <div class="loglabel">Today's log</div>
    <div class="logitems" id="logItems"></div>
  </div>
</div>

  function todayKey() {
    var d = new Date();
    return 'water:' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  var dayKey = todayKey();
  var GOAL_KEY = 'water:goal';
  var goal = parseInt(localStorage.getItem(GOAL_KEY) || String(CONFIG.defaultGoalMl), 10);
  var dayData = JSON.parse(localStorage.getItem(dayKey) || '{"total":0,"log":[]}');
  var total = dayData.total || 0;
  var log = dayData.log || [];

  var vesselOuter = document.getElementById('vesselOuter');
  var fillRect = document.getElementById('fillRect');
  var waveGroup = document.getElementById('waveGroup');
  var amtLabel = document.getElementById('amtLabel');
  var goalLabel = document.getElementById('goalLabel');
  var statusLabel = document.getElementById('statusLabel');
  var dateLabel = document.getElementById('dateLabel');
  var logSection = document.getElementById('logSection');
  var logItems = document.getElementById('logItems');
  var undoBtn = document.getElementById('undoBtn');
  var resetBtn = document.getElementById('resetBtn');
  var goalToggleBtn = document.getElementById('goalToggleBtn');
  var goalEdit = document.getElementById('goalEdit');
  var goalInput = document.getElementById('goalInput');
  var customToggleBtn = document.getElementById('customToggleBtn');
  var customRow = document.getElementById('customRow');
  var customInput = document.getElementById('customInput');
  var customAddBtn = document.getElementById('customAddBtn');

  dateLabel.textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });

  function persist() {
    localStorage.setItem(dayKey, JSON.stringify({ total: total, log: log }));
  }

  function render() {
    var pct = Math.min(100, (total / goal) * 100);
    var remaining = Math.max(0, goal - total);
    var hit = total >= goal;

    fillRect.setAttribute('y', 260 - 2.4 * pct);
    fillRect.setAttribute('height', 2.4 * pct + 20);
    waveGroup.setAttribute('transform', 'translate(0,' + (260 - 2.4 * pct - 10) + ')');

    amtLabel.textContent = total.toLocaleString();
    goalLabel.textContent = 'of ' + goal.toLocaleString() + ' ml';

    statusLabel.textContent = hit ? 'Goal reached today 🎉' : remaining.toLocaleString() + ' ml to go';
    statusLabel.className = 'status' + (hit ? ' hit' : '');

    undoBtn.disabled = log.length === 0;
    resetBtn.disabled = log.length === 0;

    if (log.length > 0) {
      logSection.style.display = 'block';
      logItems.innerHTML = log.slice().reverse().map(function (entry) {
        var t = new Date(entry.time);
        var timeStr = t.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        return '<div class="logitem"><span>' + entry.ml + ' ml</span><span class="time">' + timeStr + '</span></div>';
      }).join('');
    } else {
      logSection.style.display = 'none';
    }
  }

  function addAmount(ml) {
    if (!ml || ml <= 0) return;
    log.push({ ml: ml, time: new Date().toISOString() });
    total += ml;
    persist();
    render();
    vesselOuter.classList.add('pulse');
    setTimeout(function () { vesselOuter.classList.remove('pulse'); }, 500);
  }

  var quickGrid = document.getElementById('quickGrid');
  var dropSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69s-5 6-5 10a5 5 0 0010 0c0-4-5-10-5-10z"/></svg>';
  CONFIG.quickAmounts.forEach(function (q) {
    var btn = document.createElement('button');
    btn.className = 'qbtn';
    btn.innerHTML = dropSvg + '<span class="label">' + q.label + '</span><span class="ml">' + q.ml + ' ml</span>';
    btn.addEventListener('click', function () { addAmount(q.ml); });
    quickGrid.appendChild(btn);
  });

  document.querySelectorAll('.qbtn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      addAmount(parseInt(btn.getAttribute('data-ml'), 10));
    });
  });

  customToggleBtn.addEventListener('click', function () {
    customRow.style.display = 'flex';
    customToggleBtn.style.display = 'none';
    customInput.focus();
  });

  function submitCustom() {
    var val = parseInt(customInput.value, 10);
    if (val > 0) {
      addAmount(val);
      customInput.value = '';
      customRow.style.display = 'none';
      customToggleBtn.style.display = 'flex';
    }
  }
  customAddBtn.addEventListener('click', submitCustom);
  customInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitCustom();
  });

  undoBtn.addEventListener('click', function () {
    if (log.length === 0) return;
    var removed = log.pop();
    total = Math.max(0, total - removed.ml);
    persist();
    render();
  });

  resetBtn.addEventListener('click', function () {
    if (log.length === 0) return;
    if (!confirm('Reset today\'s log? This cannot be undone.')) return;
    total = 0;
    log = [];
    persist();
    render();
  });

  goalToggleBtn.addEventListener('click', function () {
    goalInput.value = goal;
    goalToggleBtn.style.display = 'none';
    goalEdit.style.display = 'flex';
    goalInput.focus();
  });

  function submitGoal() {
    var val = parseInt(goalInput.value, 10);
    if (val > 0) {
      goal = val;
      localStorage.setItem(GOAL_KEY, String(goal));
    }
    goalEdit.style.display = 'none';
    goalToggleBtn.style.display = 'inline';
    render();
  }
  goalInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitGoal();
  });
  goalInput.addEventListener('blur', submitGoal);

  render();
})();
</script>
</body>
</html>
