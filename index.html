<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sonu'sKhusi Water Tracker</title>
<meta name="theme-color" content="#0a2540" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0a2540;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .wrap { width: 100%; max-width: 380px; }
  h1 {
    color: #eaf6fb;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 28px;
    font-weight: 400;
    text-align: center;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .date {
    color: #5e91a8;
    font-size: 12px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 6px 0 10px;
  }
  .lovenote {
    text-align: center;
    color: #7dd3e8;
    font-size: 13px;
    font-style: italic;
    line-height: 1.5;
    margin: 0 0 24px;
    padding: 0 12px;
  }
  .lovenote .heart { color: #ff8fa3; font-style: normal; }

  .tabs {
    display: flex;
    gap: 6px;
    background: #08203a;
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    font-size: 13px;
    font-weight: 500;
    color: #5e91a8;
    border-radius: 11px;
    cursor: pointer;
    border: none;
    background: none;
  }
  .tab.active { background: #16395d; color: #eaf6fb; }

  .view { display: none; }
  .view.active { display: block; }

  .vessel-outer {
    position: relative;
    width: 224px;
    height: 288px;
    margin: 0 auto 28px;
    transition: transform 0.3s;
  }
  .vessel-outer.pulse { transform: scale(1.03); }
  svg.glass { position: absolute; inset: 0; width: 100%; height: 100%;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.35)); }
  .readout {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .readout .amt { color: #eaf6fb; font-size: 30px; font-weight: 300; }
  .readout .goal { color: #7dd3e8; font-size: 12px; letter-spacing: 0.03em; margin-top: 2px; }
  .status { text-align: center; color: #5e91a8; font-size: 14px; height: 20px; margin-bottom: 24px; }
  .status.hit { color: #7dd3e8; }
  .quickgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .qbtn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: #102f4d; border: 1px solid #1f4a66; border-radius: 16px;
    padding: 16px 8px; cursor: pointer; transition: transform 0.1s, background 0.15s;
    color: #eaf6fb;
  }
  .qbtn:hover { background: #16395d; }
  .qbtn:active { transform: scale(0.95); }
  .qbtn .label { font-size: 12px; font-weight: 500; }
  .qbtn .ml { color: #5e91a8; font-size: 11px; }
  .qbtn svg { color: #7dd3e8; }
  .customwrap { margin-bottom: 24px; }
  .customrow { display: flex; gap: 8px; }
  input[type="number"], input.goalinput {
    background: #102f4d; border: 1px solid #1f4a66; border-radius: 12px;
    color: #eaf6fb; padding: 12px 14px; font-size: 14px; outline: none;
    flex: 1; width: 100%;
  }
  input[type="number"]::placeholder { color: #5e91a8; }
  input[type="number"]:focus, input.goalinput:focus { border-color: #7dd3e8; }
  .addbtn {
    background: #1b6e8c; color: #eaf6fb; border: none; border-radius: 12px;
    padding: 0 18px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .addbtn:hover { background: #1f7fa1; }
  .addbtn:active { transform: scale(0.95); }
  .customtoggle {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
    border: 1px dashed #2d5a73; border-radius: 12px; color: #5e91a8;
    background: none; padding: 12px; font-size: 14px; cursor: pointer;
  }
  .customtoggle:hover { border-color: #7dd3e8; color: #7dd3e8; }
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: #5e91a8;
  }
  .footer button {
    background: none; border: none; color: #5e91a8; font-size: 12px;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .footer button:hover:not(:disabled) { color: #eaf6fb; }
  .footer button:disabled { opacity: 0.3; cursor: default; }
  .goaledit { display: flex; align-items: center; gap: 6px; }
  .goaledit input { width: 64px; padding: 6px 8px; border-radius: 8px; font-size: 12px; }
  .log {
    margin-top: 28px; border-top: 1px solid #1f4a66; padding-top: 14px;
  }
  .log .loglabel {
    color: #5e91a8; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .logitems { max-height: 160px; overflow-y: auto; padding-right: 4px; }
  .logitem {
    display: flex; justify-content: space-between; font-size: 14px; color: #9bbfd1; padding: 5px 0;
  }
  .logitem .time { color: #4a7286; font-size: 11px; }

  /* History view */
  .histrow {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid #16314a;
  }
  .histrow:last-child { border-bottom: none; }
  .histday {
    width: 70px; flex-shrink: 0;
    color: #9bbfd1; font-size: 13px;
  }
  .histday .y { display: block; color: #4a7286; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .histbar-track {
    flex: 1; height: 10px; background: #102f4d; border-radius: 6px; overflow: hidden;
    position: relative;
  }
  .histbar-fill {
    height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, #1b6e8c, #27c2e8);
  }
  .histbar-fill.hit { background: linear-gradient(90deg, #1b8c6e, #27e8b0); }
  .histamt {
    width: 78px; flex-shrink: 0; text-align: right;
    color: #eaf6fb; font-size: 13px; font-weight: 500;
  }
  .histamt .of { color: #5e91a8; font-weight: 400; font-size: 11px; }
  .histempty {
    text-align: center; color: #4a7286; font-size: 13px; padding: 32px 0;
  }
  .histsummary {
    display: flex; justify-content: space-between;
    margin-bottom: 18px; padding: 14px 16px;
    background: #102f4d; border-radius: 14px;
    border: 1px solid #1f4a66;
  }
  .histsummary .stat { text-align: center; flex: 1; }
  .histsummary .stat .num { color: #7dd3e8; font-size: 18px; font-weight: 500; display: block; }
  .histsummary .stat .lbl { color: #5e91a8; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; display: block; }

  @keyframes waveshift { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .wave1 { animation: waveshift 7s linear infinite; }
  .wave2 { animation: waveshift 11s linear infinite reverse; }
  @media (prefers-reduced-motion: reduce) {
    .wave1, .wave2 { animation: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Water</h1>
  <div class="date" id="dateLabel"></div>
  <div class="lovenote">Sonu <span class="heart">&#9825;</span> Khushi — you are my life.<br>Let's stay healthy together.</div>

  <div class="tabs">
    <button class="tab active" id="tabToday">Today</button>
    <button class="tab" id="tabHistory">History</button>
  </div>

  <div class="view active" id="viewToday">
    <div class="vessel-outer" id="vesselOuter">
      <svg class="glass" viewBox="0 0 200 260">
        <defs>
          <clipPath id="glassClip">
            <path d="M30 10 H170 L155 250 H45 Z" />
          </clipPath>
        </defs>
        <path d="M30 10 H170 L155 250 H45 Z" fill="rgba(255,255,255,0.03)" stroke="#2d5a73" stroke-width="2" />
        <g clip-path="url(#glassClip)">
          <rect id="fillRect" x="0" y="260" width="200" height="20" fill="#1b6e8c" style="transition: y 0.6s ease-out" />
          <g id="waveGroup" style="transition: transform 0.6s ease-out" transform="translate(0,250)">
            <path class="wave1" d="M0 10 Q 25 0, 50 10 T 100 10 T 150 10 T 200 10 T 250 10 T 300 10 T 350 10 T 400 10 V 40 H 0 Z" fill="#27c2e8" opacity="0.55" />
            <path class="wave2" d="M0 12 Q 25 4, 50 12 T 100 12 T 150 12 T 200 12 T 250 12 T 300 12 T 350 12 T 400 12 V 40 H 0 Z" fill="#7dd3e8" opacity="0.4" />
          </g>
        </g>
        <path d="M30 10 H170" stroke="#7dd3e8" stroke-width="2" opacity="0.5" />
      </svg>
      <div class="readout">
        <div class="amt" id="amtLabel">0</div>
        <div class="goal" id="goalLabel">of 2,000 ml</div>
      </div>
    </div>

    <div class="status" id="statusLabel"></div>

    <div class="quickgrid">
      <button class="qbtn" data-ml="250">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69s-5 6-5 10a5 5 0 0010 0c0-4-5-10-5-10z"/></svg>
        <span class="label">Glass</span><span class="ml">250 ml</span>
      </button>
      <button class="qbtn" data-ml="500">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69s-5 6-5 10a5 5 0 0010 0c0-4-5-10-5-10z"/></svg>
        <span class="label">Bottle</span><span class="ml">500 ml</span>
      </button>
      <button class="qbtn" data-ml="750">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69s-5 6-5 10a5 5 0 0010 0c0-4-5-10-5-10z"/></svg>
        <span class="label">Large</span><span class="ml">750 ml</span>
      </button>
    </div>

    <div class="customwrap">
      <div class="customrow" id="customRow" style="display:none;">
        <input type="number" inputmode="numeric" placeholder="Amount in ml" id="customInput" />
        <button class="addbtn" id="customAddBtn">Add</button>
      </div>
      <button class="customtoggle" id="customToggleBtn">+ Custom amount</button>
    </div>

    <div class="footer">
      <button id="undoBtn">↩ Undo last</button>
      <button id="goalToggleBtn">Set daily goal</button>
      <span class="goaledit" id="goalEdit" style="display:none;">
        <input class="goalinput" type="number" id="goalInput" />
        <span style="color:#5e91a8;">ml goal</span>
      </span>
      <button id="resetBtn">↺ Reset</button>
    </div>

    <div class="log" id="logSection" style="display:none;">
      <div class="loglabel">Today's log</div>
      <div class="logitems" id="logItems"></div>
    </div>
  </div>

  <div class="view" id="viewHistory">
    <div class="histsummary">
      <div class="stat">
        <span class="num" id="histAvg">0</span>
        <span class="lbl">Avg / day</span>
      </div>
      <div class="stat">
        <span class="num" id="histStreak">0</span>
        <span class="lbl">Goal streak</span>
      </div>
      <div class="stat">
        <span class="num" id="histDays">0</span>
        <span class="lbl">Days logged</span>
      </div>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
(function () {
  var GOAL_KEY = 'water:goal';
  var goal = parseInt(localStorage.getItem(GOAL_KEY) || '2000', 10);

  function pad(n) { return String(n).padStart(2, '0'); }
  function dateToKey(d) { return 'water:' + d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function todayKey() { return dateToKey(new Date()); }

  var dayKey = todayKey();
  var dayData = JSON.parse(localStorage.getItem(dayKey) || '{"total":0,"log":[]}');
  var total = dayData.total || 0;
  var log = dayData.log || [];

  var vesselOuter = document.getElementById('vesselOuter');
  var fillRect = document.getElementById('fillRect');
  var waveGroup = document.getElementById('waveGroup');
  var amtLabel = document.getElementById('amtLabel');
  var goalLabel = document.getElementById('goalLabel');
  var statusLabel = document.getElementById('statusLabel');
  var dateLabel = document.getElementById('dateLabel');
  var logSection = document.getElementById('logSection');
  var logItems = document.getElementById('logItems');
  var undoBtn = document.getElementById('undoBtn');
  var resetBtn = document.getElementById('resetBtn');
  var goalToggleBtn = document.getElementById('goalToggleBtn');
  var goalEdit = document.getElementById('goalEdit');
  var goalInput = document.getElementById('goalInput');
  var customToggleBtn = document.getElementById('customToggleBtn');
  var customRow = document.getElementById('customRow');
  var customInput = document.getElementById('customInput');
  var customAddBtn = document.getElementById('customAddBtn');

  var tabToday = document.getElementById('tabToday');
  var tabHistory = document.getElementById('tabHistory');
  var viewToday = document.getElementById('viewToday');
  var viewHistory = document.getElementById('viewHistory');
  var historyList = document.getElementById('historyList');
  var histAvg = document.getElementById('histAvg');
  var histStreak = document.getElementById('histStreak');
  var histDays = document.getElementById('histDays');

  dateLabel.textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });

  function persist() {
    localStorage.setItem(dayKey, JSON.stringify({ total: total, log: log }));
  }

  function render() {
    var pct = Math.min(100, (total / goal) * 100);
    var remaining = Math.max(0, goal - total);
    var hit = total >= goal;

    fillRect.setAttribute('y', 260 - 2.4 * pct);
    fillRect.setAttribute('height', 2.4 * pct + 20);
    waveGroup.setAttribute('transform', 'translate(0,' + (260 - 2.4 * pct - 10) + ')');

    amtLabel.textContent = total.toLocaleString();
    goalLabel.textContent = 'of ' + goal.toLocaleString() + ' ml';

    statusLabel.textContent = hit ? 'Goal reached today 🎉' : remaining.toLocaleString() + ' ml to go';
    statusLabel.className = 'status' + (hit ? ' hit' : '');

    undoBtn.disabled = log.length === 0;
    resetBtn.disabled = log.length === 0;

    if (log.length > 0) {
      logSection.style.display = 'block';
      logItems.innerHTML = log.slice().reverse().map(function (entry) {
        var t = new Date(entry.time);
        var timeStr = t.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        return '<div class="logitem"><span>' + entry.ml + ' ml</span><span class="time">' + timeStr + '</span></div>';
      }).join('');
    } else {
      logSection.style.display = 'none';
    }
  }

  function addAmount(ml) {
    if (!ml || ml <= 0) return;
    log.push({ ml: ml, time: new Date().toISOString() });
    total += ml;
    persist();
    render();
    vesselOuter.classList.add('pulse');
    setTimeout(function () { vesselOuter.classList.remove('pulse'); }, 500);
  }

  document.querySelectorAll('.qbtn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      addAmount(parseInt(btn.getAttribute('data-ml'), 10));
    });
  });

  customToggleBtn.addEventListener('click', function () {
    customRow.style.display = 'flex';
    customToggleBtn.style.display = 'none';
    customInput.focus();
  });

  function submitCustom() {
    var val = parseInt(customInput.value, 10);
    if (val > 0) {
      addAmount(val);
      customInput.value = '';
      customRow.style.display = 'none';
      customToggleBtn.style.display = 'flex';
    }
  }
  customAddBtn.addEventListener('click', submitCustom);
  customInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitCustom();
  });

  undoBtn.addEventListener('click', function () {
    if (log.length === 0) return;
    var removed = log.pop();
    total = Math.max(0, total - removed.ml);
    persist();
    render();
  });

  resetBtn.addEventListener('click', function () {
    if (log.length === 0) return;
    if (!confirm('Reset today\'s log? This cannot be undone.')) return;
    total = 0;
    log = [];
    persist();
    render();
  });

  goalToggleBtn.addEventListener('click', function () {
    goalInput.value = goal;
    goalToggleBtn.style.display = 'none';
    goalEdit.style.display = 'flex';
    goalInput.focus();
  });

  function submitGoal() {
    var val = parseInt(goalInput.value, 10);
    if (val > 0) {
      goal = val;
      localStorage.setItem(GOAL_KEY, String(goal));
    }
    goalEdit.style.display = 'none';
    goalToggleBtn.style.display = 'inline';
    render();
    renderHistory();
  }
  goalInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitGoal();
  });
  goalInput.addEventListener('blur', submitGoal);

  // ---------- History ----------
  function getAllDays() {
    var days = [];
    for (var i = 0; i < localStorage.length; i++) {
      var key = localStorage.key(i);
      if (key && key.indexOf('water:') === 0 && key !== GOAL_KEY) {
        var datePart = key.slice(6); // "YYYY-MM-DD"
        try {
          var data = JSON.parse(localStorage.getItem(key));
          days.push({ key: key, date: datePart, total: data.total || 0 });
        } catch (e) { /* skip corrupt entry */ }
      }
    }
    days.sort(function (a, b) { return b.date.localeCompare(a.date); });
    return days;
  }

  function formatDayLabel(dateStr) {
    var parts = dateStr.split('-').map(Number);
    var d = new Date(parts[0], parts[1] - 1, parts[2]);
    var todayStr = todayKey().slice(6);
    var yestKey = dateToKey(new Date(Date.now() - 86400000)).slice(6);
    if (dateStr === todayStr) return { main: 'Today', sub: d.toLocaleDateString(undefined, { month: 'short' }) };
    if (dateStr === yestKey) return { main: 'Yesterday', sub: d.toLocaleDateString(undefined, { month: 'short' }) };
    return {
      main: d.toLocaleDateString(undefined, { weekday: 'short' }),
      sub: d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
    };
  }

  function renderHistory() {
    var days = getAllDays();

    if (days.length === 0) {
      historyList.innerHTML = '<div class="histempty">No entries yet. Start logging water on the Today tab.</div>';
      histAvg.textContent = '0';
      histStreak.textContent = '0';
      histDays.textContent = '0';
      return;
    }

    var sum = 0;
    days.forEach(function (d) { sum += d.total; });
    var avg = Math.round(sum / days.length);

    var streak = 0;
    for (var i = 0; i < days.length; i++) {
      if (days[i].total >= goal) streak++;
      else break;
    }

    histAvg.textContent = avg.toLocaleString();
    histStreak.textContent = streak;
    histDays.textContent = days.length;

    historyList.innerHTML = days.map(function (d) {
      var label = formatDayLabel(d.date);
      var pct = Math.min(100, Math.round((d.total / goal) * 100));
      var hit = d.total >= goal;
      return '<div class="histrow">' +
        '<div class="histday">' + label.main + '<span class="y">' + label.sub + '</span></div>' +
        '<div class="histbar-track"><div class="histbar-fill' + (hit ? ' hit' : '') + '" style="width:' + pct + '%"></div></div>' +
        '<div class="histamt">' + d.total.toLocaleString() + '<span class="of"> / ' + goal.toLocaleString() + '</span></div>' +
      '</div>';
    }).join('');
  }

  tabToday.addEventListener('click', function () {
    tabToday.classList.add('active');
    tabHistory.classList.remove('active');
    viewToday.classList.add('active');
    viewHistory.classList.remove('active');
  });

  tabHistory.addEventListener('click', function () {
    tabHistory.classList.add('active');
    tabToday.classList.remove('active');
    viewHistory.classList.add('active');
    viewToday.classList.remove('active');
    renderHistory();
  });

  render();
  renderHistory();
})();
</script>
</body>
</html>
